<!DOCTYPE html>
<html lang="en">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Douala Website | Accueil</title>

    <link rel="shortcut icon" href="images/logo-douala.png" type="image/png" />
    <!-- Poppins Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap"

    />

    <!-- Swiper -->
    <link

      <div class="header-container container">
          <div class="container-fluid">
            <nav class="navbar navbar-expand-lg text-danger">
                <div class="container-fluid">
                  <a class="navbar-brand" href="index.html">
                      <img src="images/logo-douala.png" alt="logo CUD Douala" height="60">

                  <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">

                  </div>

      </div>
      </div>

                <div class="hero__intro p-5 rounded-2">
                  <h3 class="title">Douala</h3>
                  <p class="description">
                    <span class="green">La</span>
                    <span class="red">Capitale éconmique du </span>

                </div>
              </div>
             
             </div>
            <img src="/images/hero-img.jpg" alt="hero image" class="h-100 w-100 hero__img">
          </div>
          <div class="hero swiper-slide">
            <img src="/images/hero-img-1.jpg" alt="hero image" class="h-100 w-100 hero__img">
        </div>
        <div class="hero swiper-slide">
          <img src="/images/hero-img-2.jpg" alt="hero image" class="h-100 w-100 hero__img">
      </div>
          <div class="hero swiper-slide">
            <div class="container">
              <div class="container-fluid position-absolute">
                <div class="hero__intro p-5 rounded-2">

                    <span class="green">La</span>

                    <span class="yellow">Cameroun</span>
                  </p>
                </div>
              </div>

            </div>
            <img src="/images/hero-img-3.jpg" alt="hero image" class="h-100 w-100 hero__img">

                    <span class="yellow">Cameroun</span>

                </div>
              </div>
